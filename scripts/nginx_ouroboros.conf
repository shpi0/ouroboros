# Ouroboros mTLS reverse proxy
# Domain: ouroboros.iarovoivv.com
# Backend: FastAPI on localhost:8080
#
# Deploy:
#   sudo cp scripts/nginx_ouroboros.conf /etc/nginx/sites-available/ouroboros
#   sudo ln -s /etc/nginx/sites-available/ouroboros /etc/nginx/sites-enabled/ouroboros
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certs are generated by: bash scripts/gen_mtls_certs.sh
# They land in: /home/ouroboros/certs/

server {
    listen 443 ssl;
    server_name ouroboros.iarovoivv.com;

    # ── Server TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /home/ouroboros/certs/server.crt;
    ssl_certificate_key /home/ouroboros/certs/server.key;

    # ── mTLS: require client certificate signed by our CA ───────────────────
    ssl_client_certificate /home/ouroboros/certs/ca.crt;
    ssl_verify_client      on;
    ssl_verify_depth       2;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Proxy to FastAPI ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade (for /ws/chat)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket chat sessions
        proxy_read_timeout    3600;
        proxy_send_timeout    3600;
        proxy_connect_timeout 10;
    }
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name ouroboros.iarovoivv.com;
    return 301 https://$host$request_uri;
}
