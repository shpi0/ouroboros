<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --bg2: #1a1a2e; --bg3: #16213e;
    --accent: #6c63ff; --accent2: #5a52d5;
    --text: #e0e0f0; --text2: #9090a8; --text3: #606080;
    --border: #2a2a4a; --success: #4caf82; --danger: #e05a5a;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 24px; height: 52px; flex-shrink: 0; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
  nav a { color: var(--text2); text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
  nav a:hover, nav a.active { color: var(--text); background: var(--bg3); }

  main { flex: 1; overflow-y: auto; padding: 32px 20px; max-width: 640px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px; }

  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .section h2 { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 20px; font-weight: 600; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field .val { font-size: 15px; color: var(--text); }
  .field input[type=number] {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 15px; padding: 9px 13px; outline: none; width: 200px;
    transition: border-color 0.2s;
  }
  .field input[type=number]:focus { border-color: var(--accent); }

  .btn { border: none; border-radius: 8px; font-size: 14px; padding: 9px 20px; cursor: pointer; font-family: inherit; transition: opacity 0.2s, background 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c04040; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast { display: none; font-size: 13px; padding: 8px 14px; border-radius: 8px; margin-top: 12px; }
  .toast.ok { background: rgba(76,175,130,0.15); border: 1px solid rgba(76,175,130,0.4); color: var(--success); display: block; }
  .toast.err { background: rgba(224,90,90,0.15); border: 1px solid rgba(224,90,90,0.4); color: var(--danger); display: block; }

  .danger-zone { border-color: rgba(224,90,90,0.35); }
  .danger-zone h2 { color: var(--danger); }
  .danger-note { font-size: 12px; color: var(--text3); margin-top: 10px; }
</style>
</head>
<body>
<nav>
  <span class="logo">🐍 Ouroboros</span>
  <a href="/">Chat</a>
  <a href="/stats">Stats</a>
  <a href="/settings" class="active">Settings</a>
</nav>

<main>
  <!-- Info -->
  <div class="section">
    <h2>Информация</h2>
    <div class="field"><label>Версия</label><div class="val" id="val-version">…</div></div>
    <div class="field"><label>Ветка</label><div class="val" id="val-branch">…</div></div>
    <div class="field"><label>Session ID</label><div class="val" id="val-session" style="font-family:monospace;font-size:12px;">…</div></div>
  </div>

  <!-- Budget -->
  <div class="section">
    <h2>Бюджет</h2>
    <div class="field">
      <label>Потрачено</label>
      <div class="val" id="val-spent">…</div>
    </div>
    <div class="field">
      <label>Лимит (USD)</label>
      <input type="number" id="input-total" min="1" max="10000" step="0.01" value="">
    </div>
    <button class="btn btn-primary" id="save-budget-btn">Сохранить</button>
    <div class="toast" id="budget-toast"></div>
  </div>

  <!-- Restart -->
  <div class="section danger-zone">
    <h2>Принудительный рестарт</h2>
    <button class="btn btn-danger" id="restart-btn">🔄 Перезапустить агента</button>
    <div class="danger-note">Агент получит сигнал рестарта. Текущие задачи будут прерваны. Агент поднимется автоматически.</div>
    <div class="toast" id="restart-toast"></div>
  </div>
</main>

<script>
async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    if (!r.ok) throw new Error(r.statusText);
    const d = await r.json();
    document.getElementById('val-version').textContent = d.version || '?';
    document.getElementById('val-branch').textContent = d.branch || '?';
    document.getElementById('val-session').textContent = d.session_id || '?';
    document.getElementById('val-spent').textContent = '$' + Number(d.spent_usd).toFixed(4) + ' из $' + Number(d.total_usd).toFixed(2);
    document.getElementById('input-total').value = Number(d.total_usd).toFixed(2);
  } catch(e) {
    console.error(e);
  }
}

function showToast(elId, msg, isErr) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.className = 'toast ' + (isErr ? 'err' : 'ok');
  setTimeout(() => { el.className = 'toast'; }, 4000);
}

document.getElementById('save-budget-btn').addEventListener('click', async () => {
  const val = parseFloat(document.getElementById('input-total').value);
  if (!val || val <= 0) { showToast('budget-toast', 'Введите положительное число', true); return; }
  try {
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({total_usd: val}),
    });
    const d = await r.json();
    if (d.ok) showToast('budget-toast', 'Сохранено ✓', false);
    else showToast('budget-toast', d.error || 'Ошибка', true);
    await loadSettings();
  } catch(e) {
    showToast('budget-toast', String(e), true);
  }
});

document.getElementById('restart-btn').addEventListener('click', async () => {
  if (!confirm('Перезапустить агента?')) return;
  const btn = document.getElementById('restart-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/restart', {method: 'POST'});
    const d = await r.json();
    if (d.ok) showToast('restart-toast', 'Запрос отправлен ✓', false);
    else showToast('restart-toast', d.error || 'Ошибка', true);
  } catch(e) {
    showToast('restart-toast', String(e), true);
  }
  setTimeout(() => { btn.disabled = false; }, 3000);
});

loadSettings();
</script>
</body>
</html>
