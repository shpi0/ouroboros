<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --accent: #0f3460;
    --accent-hover: #1a4a7a;
    --text: #e0e0e0;
    --text-muted: #8888aa;
    --text-faint: #555577;
    --user-msg: #0f3460;
    --bot-msg: #1a1a3e;
    --border: #2a2a4e;
    --success: #4caf82;
    --error: #e05a5a;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

  nav {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 52px;
    flex-shrink: 0;
  }
  nav .logo { font-weight: 700; font-size: 17px; color: #7eb8f7; letter-spacing: 0.5px; }
  nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    padding: 5px 10px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  nav a:hover { color: var(--text); background: var(--accent); }
  nav a.active { color: var(--text); background: var(--accent); }
  .ws-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .ws-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #555;
    transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--success); }
  .ws-dot.error { background: var(--error); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .msg-meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .msg-sender { font-weight: 600; }
  .msg.user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 3px; }
  .msg.user .msg-sender { color: #7eb8f7; }
  .msg.assistant { align-self: flex-start; background: var(--bot-msg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.assistant .msg-sender { color: #a0c4ff; }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-faint);
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 14px;
    max-width: 100%;
  }
  .msg.progress { opacity: 0.75; }
  .msg.progress .msg-content::after {
    content: ' ▋';
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .msg pre {
    background: #0d0d1f;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    overflow-x: auto;
    font-size: 12.5px;
    margin: 8px 0;
  }
  .msg code {
    background: #0d0d1f;
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 12.5px;
    font-family: 'Consolas', 'Monaco', monospace;
  }
  .msg pre code { background: none; padding: 0; }

  #input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.5;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: #3a5a8e; }
  #msg-input::placeholder { color: var(--text-faint); }
  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 18px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, opacity 0.15s;
  }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
</style>
</head>
<body>
<nav>
  <span class="logo">&#9765; Ouroboros</span>
  <a href="/" class="active">Chat</a>
  <a href="/stats">Statistics</a>
  <a href="/settings">Settings</a>
  <div class="ws-status">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-label">Connecting…</span>
  </div>
</nav>

<div id="messages"></div>

<div id="input-area">
  <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
    <textarea id="msg-input" placeholder="Write a message…" rows="1"></textarea>
    <div class="hint">Ctrl+Enter to send</div>
  </div>
  <button id="send-btn" title="Send (Ctrl+Enter)">&#10148;</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const wsDot      = document.getElementById('ws-dot');
const wsLabel    = document.getElementById('ws-label');

let ws = null;
let reconnectDelay = 3000;
let progressEl = null;

function fmtTime(ts) {
  const d = ts ? new Date(ts * 1000) : new Date();
  return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

function escapeHtml(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMd(raw) {
  let t = escapeHtml(raw);
  // fenced code blocks
  t = t.replace(/```([^\n]*)\n([\s\S]*?)```/g,
    (_, lang, code) => `<pre><code>${code.trimEnd()}</code></pre>`);
  // inline code
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // bold
  t = t.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  // italic
  t = t.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  // markdown links
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // newlines (outside pre)
  t = t.replace(/\n/g, '<br>');
  return t;
}

function buildMsg(role, text, ts, extraClass) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (extraClass ? ' ' + extraClass : '');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const sender = document.createElement('span');
  sender.className = 'msg-sender';
  sender.textContent = role === 'user' ? 'You' : 'Ouroboros';
  meta.appendChild(sender);

  const time = document.createElement('span');
  time.textContent = fmtTime(ts);
  meta.appendChild(time);

  wrap.appendChild(meta);

  const content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = renderMd(text || '');
  wrap.appendChild(content);

  return wrap;
}

function addMsg(role, text, ts) {
  // Clear progress indicator when a real assistant message arrives
  if (role === 'assistant' && progressEl) {
    progressEl.remove();
    progressEl = null;
  }
  const el = buildMsg(role, text, ts);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function addSystem(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateProgress(text, ts) {
  if (!progressEl) {
    progressEl = buildMsg('assistant', text || '…', ts, 'progress');
    messagesEl.appendChild(progressEl);
  } else {
    const content = progressEl.querySelector('.msg-content');
    if (content) content.innerHTML = renderMd(text || '…');
    const time = progressEl.querySelector('.msg-meta span:last-child');
    if (time) time.textContent = fmtTime(ts);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

  ws.onopen = () => {
    wsDot.className = 'ws-dot connected';
    wsLabel.textContent = 'Connected';
    reconnectDelay = 3000;
    sendBtn.disabled = false;
  };

  ws.onclose = () => {
    wsDot.className = 'ws-dot error';
    wsLabel.textContent = 'Disconnected';
    sendBtn.disabled = true;
    if (progressEl) { progressEl.remove(); progressEl = null; }
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
  };

  ws.onerror = () => {
    wsDot.className = 'ws-dot error';
    wsLabel.textContent = 'Error';
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    const role = msg.role;
    if (role === 'user') {
      // user echo from server — already shown optimistically, skip
    } else if (role === 'assistant') {
      if (msg.is_progress) {
        updateProgress(msg.text, msg.ts);
      } else {
        addMsg('assistant', msg.text || '', msg.ts);
      }
    } else if (msg.type === 'system') {
      addSystem(msg.text || '');
    }
  };
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Optimistic render
  addMsg('user', text, null);
  updateProgress('…', null);

  ws.send(JSON.stringify({text}));
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
  }
});

connect();
</script>
</body>
</html>
