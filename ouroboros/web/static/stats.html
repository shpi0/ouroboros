<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --bg2: #1a1a2e; --bg3: #16213e;
    --accent: #6c63ff; --accent2: #5a52d5;
    --text: #e0e0f0; --text2: #9090a8; --text3: #606080;
    --border: #2a2a4a; --success: #4caf82; --warn: #f0a050;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 24px; height: 52px; flex-shrink: 0; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
  nav a { color: var(--text2); text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
  nav a:hover, nav a.active { color: var(--text); background: var(--bg3); }
  #refresh-btn { margin-left: auto; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 13px; padding: 6px 14px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  #refresh-btn:hover { color: var(--text); border-color: var(--accent); }

  main { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; }
  .card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .card .value { font-size: 24px; font-weight: 700; color: var(--text); }
  .card .sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .card.warn .value { color: var(--warn); }
  .card.ok .value { color: var(--success); }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .chart-row { grid-template-columns: 1fr; } }

  .chart-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .chart-box h3 { font-size: 13px; color: var(--text2); margin-bottom: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .chart-box canvas { max-height: 260px; }

  #last-update { text-align: right; font-size: 11px; color: var(--text3); }
</style>
</head>
<body>
<nav>
  <span class="logo">🐍 Ouroboros</span>
  <a href="/">Chat</a>
  <a href="/stats" class="active">Stats</a>
  <a href="/settings">Settings</a>
  <button id="refresh-btn">↺ Refresh</button>
</nav>

<main>
  <div class="cards" id="cards">
    <div class="card"><div class="label">Loading…</div><div class="value">—</div></div>
  </div>
  <div id="last-update">—</div>
  <div class="chart-row">
    <div class="chart-box">
      <h3>Расход по времени (USD)</h3>
      <canvas id="timeline-chart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Топ инструментов по вызовам</h3>
      <canvas id="tools-chart"></canvas>
    </div>
  </div>
</main>

<script>
let timelineChart = null;
let toolsChart = null;

const CHART_DEFAULTS = {
  color: '#9090a8',
  plugins: { legend: { labels: { color: '#9090a8', font: { size: 12 } } } },
  scales: {
    x: { ticks: { color: '#9090a8', font: { size: 11 } }, grid: { color: '#2a2a4a' } },
    y: { ticks: { color: '#9090a8', font: { size: 11 } }, grid: { color: '#2a2a4a' } },
  },
};

function fmtUsd(v) { return '$' + Number(v).toFixed(4); }
function fmtNum(v) { return Number(v).toLocaleString('ru-RU'); }

async function load() {
  try {
    const res = await fetch('/api/stats');
    if (!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    // API returns { state: {...}, top_tools: [...], cost_timeline: [...] }
    const s = d.state || {};
    renderCards(s, d);
    renderTimeline(d.cost_timeline || []);
    renderTools(d.top_tools || []);
    document.getElementById('last-update').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');
  } catch(e) {
    document.getElementById('cards').innerHTML =
      `<div class="card"><div class="label">Error</div><div class="value" style="font-size:14px;color:#e05a5a">${e}</div></div>`;
  }
}

function renderCards(s) {
  const spent = s.spent_usd || 0;
  const total = s.total_budget || 50;
  const session = s.session_spent || 0;
  const remaining = s.remaining_usd || (total - spent);
  const pct = total > 0 ? (spent / total * 100).toFixed(1) : '?';
  const warnClass = parseFloat(pct) > 80 ? 'warn' : parseFloat(pct) > 50 ? '' : 'ok';
  const cards = [
    { label: 'Потрачено (всего)', value: fmtUsd(spent), sub: `из ${fmtUsd(total)} (${pct}%)`, cls: warnClass },
    { label: 'За сессию', value: fmtUsd(session), sub: `остаток: ${fmtUsd(remaining)}` },
    { label: 'LLM вызовов', value: fmtNum(s.spent_calls || 0), sub: '' },
    { label: 'Токены (prompt)', value: fmtNum(s.spent_tokens_prompt || 0), sub: '' },
    { label: 'Токены (cached)', value: fmtNum(s.spent_tokens_cached || 0), sub: '(не оплачиваются)' },
    { label: 'Токены (completion)', value: fmtNum(s.spent_tokens_completion || 0), sub: '' },
    { label: 'Версия', value: s.version || '?', sub: s.branch || '' },
  ];
  document.getElementById('cards').innerHTML = cards.map(c =>
    `<div class="card ${c.cls||''}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ''}
    </div>`
  ).join('');
}

function renderTimeline(data) {
  // data: [{hour: "2026-04-24T10", cost: 0.12}, ...]
  const ctx = document.getElementById('timeline-chart').getContext('2d');
  const labels = data.map(pt => (pt.hour || '').slice(11, 16) || pt.hour || '');
  const values = data.map(pt => pt.cost || 0);

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'USD/hour',
        data: values,
        borderColor: '#6c63ff',
        backgroundColor: 'rgba(108,99,255,0.12)',
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#6c63ff',
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        ...CHART_DEFAULTS.plugins,
        tooltip: {
          callbacks: { label: ctx => ' $' + ctx.parsed.y.toFixed(5) },
        },
      },
    },
  });
}

function renderTools(data) {
  // data: [{name: "tool_name", count: 42}, ...]
  const ctx = document.getElementById('tools-chart').getContext('2d');
  const top = data.slice(0, 12);
  const COLORS = ['#6c63ff','#5a52d5','#4caf82','#f0a050','#e05a5a','#50c8f0',
                  '#a06cff','#82cf50','#ff8c50','#50a0ff','#d050ff','#50ffb8'];

  if (toolsChart) toolsChart.destroy();
  toolsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(t => (t.name || t.tool || '').replace(/_/g, ' ')),
      datasets: [{
        label: 'calls',
        data: top.map(t => t.count || 0),
        backgroundColor: top.map((_, i) => COLORS[i % COLORS.length]),
        borderRadius: 6,
      }],
    },
    options: {
      indexAxis: 'y',
      ...CHART_DEFAULTS,
      plugins: {
        ...CHART_DEFAULTS.plugins,
        legend: { display: false },
      },
    },
  });
}

document.getElementById('refresh-btn').addEventListener('click', load);
load();
setInterval(load, 30000);
</script>
</body>
</html>
